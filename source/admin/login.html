<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Token Login</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin: 0 0 30px 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0052a3;
    }
    .help {
      margin-top: 20px;
      padding: 12px;
      background: #f9f9f9;
      border-left: 3px solid #0066cc;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GitHub Token Login</h1>
    <form id="tokenForm">
      <div class="form-group">
        <label for="token">GitHub Personal Access Token:</label>
        <input 
          type="password" 
          id="token" 
          name="token" 
          placeholder="ghp_xxxxx..." 
          required
          autocomplete="off"
        />
      </div>
      <button type="submit">Login</button>
    </form>
    <div class="help">
      <p><strong>How to get a token:</strong></p>
      <ol style="margin: 8px 0; padding-left: 20px;">
        <li>Go to <a href="https://github.com/settings/tokens" target="_blank">GitHub Settings → Tokens</a></li>
        <li>Click "Generate new token (classic)"</li>
        <li>Select <strong>repo</strong> scope</li>
        <li>Copy and paste the token here</li>
      </ol>
      <p style="margin: 8px 0;"><strong>Note:</strong> Your token is stored in browser storage for this session only.</p>
    </div>
  </div>

  <script>
    document.getElementById('tokenForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const token = document.getElementById('token').value;
      localStorage.setItem('github_token', token);
      window.location.href = '/admin/';
    });
  </script>
</body>
</html>
