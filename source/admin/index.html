<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内容管理</title>
    <style>
      /* ========== 全局CSS变量覆盖 - 修复深色主题/背景问题 ========== */
      :root,
      * {
        --nc-text: #1f2937 !important;
        --nc-text-muted: #6b7280 !important;
        --nc-bg: #f3f4f6 !important;
        --nc-surface: #ffffff !important;
        --nc-surface-hover: #f9fafb !important;
        --nc-border: #e5e7eb !important;
        --nc-primary: #2563eb !important;
        --nc-primary-hover: #1d4ed8 !important;
        --nc-primary-contrast: #ffffff !important;
        --nc-accent: #10b981 !important;
        --nc-accent-hover: #059669 !important;
        --nc-danger: #ef4444 !important;
        --nc-warning: #f59e0b !important;

        --color-bg: #f3f4f6 !important;
        --color-surface: #ffffff !important;
        --color-text: #1f2937 !important;
        --color-text-light: #6b7280 !important;
        --color-primary: #2563eb !important;
        --color-border: #e5e7eb !important;
      }

      /* ========== 修复按钮/头部深色背景问题 ========== */
      button,
      [role="button"],
      [class*="Button"],
      [class*="button"],
      [class*="Btn"],
      [class*="btn"],
      header button,
      header [role="button"],
      [class*="Header"] button,
      [class*="header"] button,
      [class*="Toolbar"] button,
      [class*="toolbar"] button,
      [class*="Toggle"] button,
      [class*="toggle"] button,
      select,
      [class*="Select"],
      [class*="select"] {
        background-color: #ffffff !important;
        color: #1f2937 !important;
        border: 1px solid #d1d5db !important;
      }

      button:hover,
      [role="button"]:hover,
      [class*="Button"]:hover,
      [class*="button"]:hover,
      [class*="Btn"]:hover,
      [class*="btn"]:hover {
        background-color: #f3f4f6 !important;
      }

      /* 修复头部/工具栏深色背景 */
      header,
      [class*="Header"],
      [class*="header"],
      [class*="Toolbar"],
      [class*="toolbar"],
      [class*="TopBar"],
      [class*="top-bar"],
      [class*="Topbar"],
      [class*="NavBar"],
      [class*="navbar"],
      [class*="Nav-bar"] {
        background-color: #ffffff !important;
        border-bottom: 1px solid #e5e7eb !important;
        color: #1f2937 !important;
      }

      /* 修复侧边栏深色背景 */
      [class*="Sidebar"],
      [class*="sidebar"],
      [class*="SideBar"],
      aside,
      nav {
        background-color: #f9fafb !important;
        color: #1f2937 !important;
        border-right: 1px solid #e5e7eb !important;
      }

      /* ========== 修复文章列表标题可见性 ========== */
      [class*="EntryListing"] h1,
      [class*="EntryListing"] h2,
      [class*="EntryListing"] h3,
      [class*="EntryListing"] h4,
      [class*="EntryListing"] h5,
      [class*="EntryListing"] h6,
      [class*="EntryListing"] span,
      [class*="EntryListing"] p,
      [class*="EntryListing"] div,
      [class*="EntryListing"] a,
      [class*="ListItem"] h1,
      [class*="ListItem"] h2,
      [class*="ListItem"] h3,
      [class*="ListItem"] h4,
      [class*="ListItem"] h5,
      [class*="ListItem"] h6,
      [class*="ListItem"] span,
      [class*="ListItem"] p,
      [class*="ListItem"] div,
      [class*="ListItem"] a,
      [class*="entry-listing"] h1,
      [class*="entry-listing"] h2,
      [class*="entry-listing"] h3,
      [class*="entry-listing"] span,
      [class*="entry-listing"] p,
      [class*="entry-listing"] a,
      [class*="list-item"] h1,
      [class*="list-item"] h2,
      [class*="list-item"] h3,
      [class*="list-item"] span,
      [class*="list-item"] p,
      [class*="list-item"] a {
        color: #1f2937 !important;
        opacity: 1 !important;
      }

      /* ========== 列表项布局：标题左 + 日期右（基于JS拆分后的class） ========== */
      /* 基础容器样式（不强制flex，避免破坏原有嵌套结构） */
      [class*="EntryListing"],
      [class*="ListItem"],
      [class*="entry-listing"],
      [class*="list-item"],
      [class*="EntryCard"],
      [class*="entry-card"],
      [class*="CardEntry"],
      [class*="card-entry"] {
        background-color: #ffffff !important;
        padding: 12px 16px !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 6px !important;
        margin-bottom: 8px !important;
      }

      /* JS拆分后附加的flex行容器 */
      .entry-row-flex {
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: center !important;
        width: 100% !important;
        gap: 16px !important;
      }

      /* 拆分后的左侧标题 */
      .entry-title-left {
        flex: 1 1 auto !important;
        text-align: left !important;
        color: #111827 !important;
        font-weight: 500 !important;
        font-size: 1rem !important;
        line-height: 1.4 !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        white-space: nowrap !important;
      }

      /* 拆分后的右侧日期 */
      .entry-date-right {
        flex: 0 0 auto !important;
        text-align: right !important;
        color: #6b7280 !important;
        font-size: 0.875rem !important;
        white-space: nowrap !important;
        font-variant-numeric: tabular-nums !important;
      }

      /* 兜底：针对直接作为a子元素的span（table/list视图）也生效 */
      [class*="EntryListing"] a,
      [class*="ListItem"] a,
      [class*="entry-listing"] a,
      [class*="list-item"] a,
      [class*="EntryCard"] a,
      [class*="entry-card"] a {
        width: 100% !important;
        color: #1f2937 !important;
        text-decoration: none !important;
      }

      /* ========== 链接颜色修复 ========== */
      [class*="ListItem"] a,
      [class*="EntryListing"] a,
      [class*="list-item"] a,
      [class*="entry-listing"] a {
        color: #2563eb !important;
      }

      /* ========== 标准卡片和列表修复 ========== */
      [class*="Card"] h2,
      [class*="Card"] h3,
      [class*="Card"] h4,
      [class*="Card"] span,
      [class*="Card"] p,
      [class*="card"] h2,
      [class*="card"] h3,
      [class*="card"] span,
      [class*="card"] p {
        color: #111827 !important;
      }

      [class*="Card"],
      [class*="card"] {
        background-color: #ffffff !important;
      }

      /* ========== 侧边栏和导航文字修复 ========== */
      [class*="Sidebar"] span,
      [class*="Sidebar"] a,
      [class*="Sidebar"] h1,
      [class*="Sidebar"] h2,
      [class*="Sidebar"] h3,
      [class*="sidebar"] span,
      [class*="sidebar"] a,
      [class*="sidebar"] h1,
      [class*="sidebar"] h2 {
        color: #374151 !important;
      }

      /* ========== 集合列表修复 ========== */
      a[class*="Collection"],
      li[class*="Collection"] span,
      li[class*="Collection"] h2,
      [class*="entries"] a,
      [class*="entries"] h2,
      [class*="entries"] h3,
      [class*="entries"] span,
      [class*="Entries"] a,
      [class*="Entries"] h2,
      [class*="Entries"] h3,
      [class*="Entries"] span {
        color: #111827 !important;
      }

      /* ========== 表单控件修复 ========== */
      [data-slate-editor],
      [role="textbox"],
      label,
      input,
      textarea,
      select,
      option {
        color: #111827 !important;
        background-color: #ffffff !important;
      }

      input,
      textarea,
      select {
        border: 1px solid #d1d5db !important;
      }

      /* ========== 主体颜色继承修复 ========== */
      main *,
      section *,
      article * {
        color: inherit;
      }

      main,
      section,
      article,
      body {
        color: #1f2937 !important;
        background-color: #f3f4f6 !important;
      }

      /* ========== CSS-in-JS 类名覆盖 ========== */
      [class*="css-"] {
        color: #1f2937 !important;
        background-color: transparent !important;
      }

      /* 修复任何深色背景的div（如按钮、状态块） */
      [style*="background-color: rgb("],
      [style*="background-color:#"],
      [style*="background: rgb("],
      [style*="background:#"] {
        background-color: #ffffff !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
    <script>
      async function uploadToR2(file, uploadUrl) {
        const formData = new FormData();
        formData.append('file', file, file.name);

        const response = await fetch(uploadUrl, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || 'Upload failed');
        }

        return response.json();
      }

      // 注册 R2 媒体库
      if (window.CMS && typeof window.CMS.registerMediaLibrary === 'function') {
        window.CMS.registerMediaLibrary({
          name: 'r2',
          label: 'Cloudflare R2 存储',
          async init({ options = {}, handleInsertMedia, onClose }) {
            const uploadUrl = options.upload_url || '/api/r2-upload';
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = options.accept || 'image/*';
            input.multiple = true;

            input.addEventListener('change', async () => {
              const files = Array.from(input.files || []);
              if (!files.length) {
                onClose();
                return;
              }

              try {
                const uploaded = [];

                for (const file of files) {
                  const result = await uploadToR2(file, uploadUrl);

                  if (typeof result.url !== 'string') {
                    throw new Error('Invalid upload response');
                  }

                  uploaded.push({
                    id: result.url,
                    name: file.name,
                    url: result.url,
                    display_url: result.url,
                    path: result.url,
                  });
                }

                handleInsertMedia(uploaded);
              } catch (error) {
                console.error('R2 upload error', error);
                window.alert('上传图片失败：' + error.message);
              } finally {
                onClose();
              }
            });

            input.click();
            return {
              open: () => input.click(),
            };
          },
        });
      }

      // 加载中文语言包
      if (window.CMS && typeof window.CMS.registerLocale === 'function') {
        fetch('https://unpkg.com/decap-cms@^3/dist/locales/zh.js')
          .then(res => res.text())
          .then(js => {
            // 执行语言包脚本
            const script = document.createElement('script');
            script.textContent = js;
            document.body.appendChild(script);
            
            // 注册语言
            setTimeout(() => {
              if (window.CMS_LOCALE_ZH) {
                window.CMS.registerLocale('zh', window.CMS_LOCALE_ZH);
              }
            }, 100);
          })
          .catch(err => console.warn('Failed to load Chinese locale:', err));
      }

      // ========== 拆分文章列表的 summary 字符串：标题左 | 日期右 ==========
      (function () {
        const SPLIT_MARK = '__TITLE_DATE_SPLIT__';
        const PROCESSED_FLAG = '__entry_split_done__';

        function splitTextNode(textNode) {
          const text = textNode.nodeValue;
          if (!text || text.indexOf(SPLIT_MARK) === -1) return false;

          const parts = text.split(SPLIT_MARK);
          if (parts.length !== 2) return false;
          const titleText = (parts[0] || '').trim();
          const dateText = (parts[1] || '').trim();
          if (!titleText && !dateText) return false;

          const row = document.createElement('div');
          row.className = 'entry-row-flex';

          const titleSpan = document.createElement('span');
          titleSpan.className = 'entry-title-left';
          titleSpan.textContent = titleText || '(无标题)';

          const dateSpan = document.createElement('span');
          dateSpan.className = 'entry-date-right';
          dateSpan.textContent = dateText || '';

          row.appendChild(titleSpan);
          row.appendChild(dateSpan);

          const parent = textNode.parentNode;
          if (!parent) return false;
          parent.replaceChild(row, textNode);
          row[PROCESSED_FLAG] = true;
          return true;
        }

        function scanAndSplit(root) {
          if (!root) root = document.body;
          let found = 0;
          const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode: function (node) {
              if (!node.nodeValue || node.nodeValue.indexOf(SPLIT_MARK) === -1) {
                return NodeFilter.FILTER_REJECT;
              }
              // 避免处理已经拆分行的内部文本、script/style 等
              let p = node.parentNode;
              while (p && p !== root) {
                if (p.nodeType === 1) {
                  const tag = (p.tagName || '').toUpperCase();
                  if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'NOSCRIPT') {
                    return NodeFilter.FILTER_REJECT;
                  }
                  if (p.classList && p.classList.contains('entry-row-flex')) {
                    return NodeFilter.FILTER_REJECT;
                  }
                }
                p = p.parentNode;
              }
              return NodeFilter.FILTER_ACCEPT;
            }
          });

          // 需要先收集再处理，防止 walker 替换节点时遍历顺序被破坏
          const targets = [];
          let n;
          while ((n = walker.nextNode())) targets.push(n);

          for (let i = 0; i < targets.length; i++) {
            if (splitTextNode(targets[i])) found++;
          }
          return found;
        }

        // 启动：立刻执行一次，之后使用 MutationObserver 监听 CMS 动态渲染，setInterval 兜底 10s
        function boot() {
          scanAndSplit(document.body);

          const observer = new MutationObserver(function (mutations) {
            for (let i = 0; i < mutations.length; i++) {
              const m = mutations[i];
              if (m.addedNodes && m.addedNodes.length) {
                // 粗略扫描：只要有新增节点就全量扫 body（body 范围不大，性能可接受）
                scanAndSplit(document.body);
                break;
              }
            }
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            characterData: true,
          });

          // 兜底轮询：10 秒内每 500ms 扫一次，防止 MutationObserver 漏网
          let rounds = 0;
          const timer = setInterval(function () {
            rounds++;
            scanAndSplit(document.body);
            if (rounds >= 20) clearInterval(timer);
          }, 500);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot);
        } else {
          boot();
        }
      })();
    </script>
  </body>
</html>
