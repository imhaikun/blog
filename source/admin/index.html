<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内容管理</title>
    <style>
      /* ========== 全局CSS变量覆盖 - 修复深色主题/背景问题 ========== */
      :root,
      * {
        --nc-text: #1f2937 !important;
        --nc-text-muted: #6b7280 !important;
        --nc-bg: #f3f4f6 !important;
        --nc-surface: #ffffff !important;
        --nc-surface-hover: #f9fafb !important;
        --nc-border: #e5e7eb !important;
        --nc-primary: #2563eb !important;
        --nc-primary-hover: #1d4ed8 !important;
        --nc-primary-contrast: #ffffff !important;
        --nc-accent: #10b981 !important;
        --nc-accent-hover: #059669 !important;
        --nc-danger: #ef4444 !important;
        --nc-warning: #f59e0b !important;

        --color-bg: #f3f4f6 !important;
        --color-surface: #ffffff !important;
        --color-text: #1f2937 !important;
        --color-text-light: #6b7280 !important;
        --color-primary: #2563eb !important;
        --color-border: #e5e7eb !important;
      }

      /* ========== 修复按钮/头部深色背景问题 ========== */
      button,
      [role="button"],
      [class*="Button"],
      [class*="button"],
      [class*="Btn"],
      [class*="btn"],
      header button,
      header [role="button"],
      [class*="Header"] button,
      [class*="header"] button,
      [class*="Toolbar"] button,
      [class*="toolbar"] button,
      [class*="Toggle"] button,
      [class*="toggle"] button,
      select,
      [class*="Select"],
      [class*="select"] {
        background-color: #ffffff !important;
        color: #1f2937 !important;
        border: 1px solid #d1d5db !important;
      }

      button:hover,
      [role="button"]:hover,
      [class*="Button"]:hover,
      [class*="button"]:hover,
      [class*="Btn"]:hover,
      [class*="btn"]:hover {
        background-color: #f3f4f6 !important;
      }

      /* 修复头部/工具栏深色背景 */
      header,
      [class*="Header"],
      [class*="header"],
      [class*="Toolbar"],
      [class*="toolbar"],
      [class*="TopBar"],
      [class*="top-bar"],
      [class*="Topbar"],
      [class*="NavBar"],
      [class*="navbar"],
      [class*="Nav-bar"] {
        background-color: #ffffff !important;
        border-bottom: 1px solid #e5e7eb !important;
        color: #1f2937 !important;
      }

      /* 修复侧边栏深色背景 */
      [class*="Sidebar"],
      [class*="sidebar"],
      [class*="SideBar"],
      aside,
      nav {
        background-color: #f9fafb !important;
        color: #1f2937 !important;
        border-right: 1px solid #e5e7eb !important;
      }

      /* ========== 修复文章列表标题可见性 ========== */
      [class*="EntryListing"] h1,
      [class*="EntryListing"] h2,
      [class*="EntryListing"] h3,
      [class*="EntryListing"] h4,
      [class*="EntryListing"] h5,
      [class*="EntryListing"] h6,
      [class*="EntryListing"] span,
      [class*="EntryListing"] p,
      [class*="EntryListing"] div,
      [class*="EntryListing"] a,
      [class*="ListItem"] h1,
      [class*="ListItem"] h2,
      [class*="ListItem"] h3,
      [class*="ListItem"] h4,
      [class*="ListItem"] h5,
      [class*="ListItem"] h6,
      [class*="ListItem"] span,
      [class*="ListItem"] p,
      [class*="ListItem"] div,
      [class*="ListItem"] a,
      [class*="entry-listing"] h1,
      [class*="entry-listing"] h2,
      [class*="entry-listing"] h3,
      [class*="entry-listing"] span,
      [class*="entry-listing"] p,
      [class*="entry-listing"] a,
      [class*="list-item"] h1,
      [class*="list-item"] h2,
      [class*="list-item"] h3,
      [class*="list-item"] span,
      [class*="list-item"] p,
      [class*="list-item"] a {
        color: #1f2937 !important;
        opacity: 1 !important;
      }

      /* ========== 列表项布局：标题左 + 日期右（基于JS拆分后的class） ========== */
      /* 基础容器样式（不强制flex，避免破坏原有嵌套结构） */
      [class*="EntryListing"],
      [class*="ListItem"],
      [class*="entry-listing"],
      [class*="list-item"],
      [class*="EntryCard"],
      [class*="entry-card"],
      [class*="CardEntry"],
      [class*="card-entry"] {
        background-color: #ffffff !important;
        padding: 12px 16px !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 6px !important;
        margin-bottom: 8px !important;
      }

      /* JS拆分后附加的flex行容器 */
      .entry-row-flex {
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: center !important;
        width: 100% !important;
        gap: 16px !important;
      }

      /* 拆分后的左侧标题 */
      .entry-title-left {
        flex: 1 1 auto !important;
        text-align: left !important;
        color: #111827 !important;
        font-weight: 500 !important;
        font-size: 1rem !important;
        line-height: 1.4 !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        white-space: nowrap !important;
      }

      /* 拆分后的右侧日期 */
      .entry-date-right {
        flex: 0 0 auto !important;
        text-align: right !important;
        color: #6b7280 !important;
        font-size: 0.875rem !important;
        white-space: nowrap !important;
        font-variant-numeric: tabular-nums !important;
      }

      /* 兜底：针对直接作为a子元素的span（table/list视图）也生效 */
      [class*="EntryListing"] a,
      [class*="ListItem"] a,
      [class*="entry-listing"] a,
      [class*="list-item"] a,
      [class*="EntryCard"] a,
      [class*="entry-card"] a {
        width: 100% !important;
        color: #1f2937 !important;
        text-decoration: none !important;
      }

      /* ========== 链接颜色修复 ========== */
      [class*="ListItem"] a,
      [class*="EntryListing"] a,
      [class*="list-item"] a,
      [class*="entry-listing"] a {
        color: #2563eb !important;
      }

      /* ========== 标准卡片和列表修复 ========== */
      [class*="Card"] h2,
      [class*="Card"] h3,
      [class*="Card"] h4,
      [class*="Card"] span,
      [class*="Card"] p,
      [class*="card"] h2,
      [class*="card"] h3,
      [class*="card"] span,
      [class*="card"] p {
        color: #111827 !important;
      }

      [class*="Card"],
      [class*="card"] {
        background-color: #ffffff !important;
      }

      /* ========== 侧边栏和导航文字修复 ========== */
      [class*="Sidebar"] span,
      [class*="Sidebar"] a,
      [class*="Sidebar"] h1,
      [class*="Sidebar"] h2,
      [class*="Sidebar"] h3,
      [class*="sidebar"] span,
      [class*="sidebar"] a,
      [class*="sidebar"] h1,
      [class*="sidebar"] h2 {
        color: #374151 !important;
      }

      /* ========== 集合列表修复 ========== */
      a[class*="Collection"],
      li[class*="Collection"] span,
      li[class*="Collection"] h2,
      [class*="entries"] a,
      [class*="entries"] h2,
      [class*="entries"] h3,
      [class*="entries"] span,
      [class*="Entries"] a,
      [class*="Entries"] h2,
      [class*="Entries"] h3,
      [class*="Entries"] span {
        color: #111827 !important;
      }

      /* ========== 表单控件修复 ========== */
      [data-slate-editor],
      [role="textbox"],
      label,
      input,
      textarea,
      select,
      option {
        color: #111827 !important;
        background-color: #ffffff !important;
      }

      input,
      textarea,
      select {
        border: 1px solid #d1d5db !important;
      }

      /* ========== 主体颜色继承修复 ========== */
      main *,
      section *,
      article * {
        color: inherit;
      }

      main,
      section,
      article,
      body {
        color: #1f2937 !important;
        background-color: #f3f4f6 !important;
      }

      /* ========== CSS-in-JS 类名覆盖 ========== */
      [class*="css-"] {
        color: #1f2937 !important;
        background-color: transparent !important;
      }

      /* 修复任何深色背景的div（如按钮、状态块） */
      [style*="background-color: rgb("],
      [style*="background-color:#"],
      [style*="background: rgb("],
      [style*="background:#"] {
        background-color: #ffffff !important;
      }

      /* ========== 紧凑行布局（类似目录列表） ========== */
      /* 先把外层卡片/列表项改成无边框、无间距的紧凑行 */
      [class*="EntryListing"],
      [class*="entry-listing"],
      [class*="EntriesList"],
      [class*="entries-list"] {
        background-color: #ffffff !important;
      }

      [class*="EntryListing"] > *,
      [class*="entry-listing"] > *,
      [class*="ListItem"],
      [class*="list-item"],
      [class*="EntryCard"],
      [class*="entry-card"],
      [class*="CardEntry"],
      [class*="card-entry"],
      [class*="EntryRow"],
      [class*="entry-row"] {
        background-color: transparent !important;
        padding: 6px 4px !important;
        border: none !important;
        border-radius: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border-bottom: 1px dashed #9ca3af !important;
      }

      [class*="ListItem"]:last-child,
      [class*="list-item"]:last-child,
      [class*="EntryCard"]:last-child,
      [class*="entry-card"]:last-child {
        border-bottom: none !important;
      }

      /* 行内 a 标签占满宽度 */
      [class*="ListItem"] a,
      [class*="list-item"] a,
      [class*="EntryCard"] a,
      [class*="entry-card"] a,
      [class*="EntryListing"] a,
      [class*="entry-listing"] a {
        width: 100% !important;
        display: block !important;
        padding: 0 !important;
        color: #111827 !important;
        text-decoration: none !important;
      }

      /* ========== 高优先级：拆分后的标题+日期 左右对齐 ========== */
      body .entry-row-flex,
      html body .entry-row-flex,
      [class*="EntryListing"] .entry-row-flex,
      [class*="entry-listing"] .entry-row-flex,
      [class*="ListItem"] .entry-row-flex,
      [class*="list-item"] .entry-row-flex,
      [class*="EntryCard"] .entry-row-flex,
      [class*="entry-card"] .entry-row-flex {
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: baseline !important;
        width: 100% !important;
        gap: 24px !important;
        padding: 0 !important;
        margin: 0 !important;
        border: none !important;
        background: transparent !important;
      }

      /* 左侧标题 */
      body .entry-row-flex .entry-title-left,
      html body .entry-row-flex .entry-title-left,
      [class*="EntryListing"] .entry-title-left,
      [class*="entry-listing"] .entry-title-left,
      [class*="ListItem"] .entry-title-left,
      [class*="list-item"] .entry-title-left,
      [class*="EntryCard"] .entry-title-left,
      [class*="entry-card"] .entry-title-left {
        flex: 1 1 auto !important;
        text-align: left !important;
        color: #111827 !important;
        font-weight: 400 !important;
        font-size: 1rem !important;
        line-height: 1.8 !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        white-space: nowrap !important;
        display: inline-block !important;
      }

      /* 右侧日期 */
      body .entry-row-flex .entry-date-right,
      html body .entry-row-flex .entry-date-right,
      [class*="EntryListing"] .entry-date-right,
      [class*="entry-listing"] .entry-date-right,
      [class*="ListItem"] .entry-date-right,
      [class*="list-item"] .entry-date-right,
      [class*="EntryCard"] .entry-date-right,
      [class*="entry-card"] .entry-date-right {
        flex: 0 0 auto !important;
        text-align: right !important;
        color: #6b7280 !important;
        font-size: 0.9rem !important;
        font-weight: 400 !important;
        white-space: nowrap !important;
        font-variant-numeric: tabular-nums !important;
        display: inline-block !important;
        line-height: 1.8 !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
    <script>
      async function uploadToR2(file, uploadUrl) {
        const formData = new FormData();
        formData.append('file', file, file.name);

        const response = await fetch(uploadUrl, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || 'Upload failed');
        }

        return response.json();
      }

      // 注册 R2 媒体库
      if (window.CMS && typeof window.CMS.registerMediaLibrary === 'function') {
        window.CMS.registerMediaLibrary({
          name: 'r2',
          label: 'Cloudflare R2 存储',
          async init({ options = {}, handleInsertMedia, onClose }) {
            const uploadUrl = options.upload_url || '/api/r2-upload';
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = options.accept || 'image/*';
            input.multiple = true;

            input.addEventListener('change', async () => {
              const files = Array.from(input.files || []);
              if (!files.length) {
                onClose();
                return;
              }

              try {
                const uploaded = [];

                for (const file of files) {
                  const result = await uploadToR2(file, uploadUrl);

                  if (typeof result.url !== 'string') {
                    throw new Error('Invalid upload response');
                  }

                  uploaded.push({
                    id: result.url,
                    name: file.name,
                    url: result.url,
                    display_url: result.url,
                    path: result.url,
                  });
                }

                handleInsertMedia(uploaded);
              } catch (error) {
                console.error('R2 upload error', error);
                window.alert('上传图片失败：' + error.message);
              } finally {
                onClose();
              }
            });

            input.click();
            return {
              open: () => input.click(),
            };
          },
        });
      }

      // 加载中文语言包
      if (window.CMS && typeof window.CMS.registerLocale === 'function') {
        fetch('https://unpkg.com/decap-cms@^3/dist/locales/zh.js')
          .then(res => res.text())
          .then(js => {
            // 执行语言包脚本
            const script = document.createElement('script');
            script.textContent = js;
            document.body.appendChild(script);
            
            // 注册语言
            setTimeout(() => {
              if (window.CMS_LOCALE_ZH) {
                window.CMS.registerLocale('zh', window.CMS_LOCALE_ZH);
              }
            }, 100);
          })
          .catch(err => console.warn('Failed to load Chinese locale:', err));
      }

      // ========== 拆分文章列表的 summary 字符串：标题左 | 日期右 ==========
      (function () {
        const SPLIT_MARK = '__TITLE_DATE_SPLIT__';
        const PROCESSED_FLAG = '__entry_split_done__';
        let debounceTimer = null;

        function splitTextNode(textNode) {
          const text = textNode.nodeValue;
          if (text === null || text === undefined) return false;
          if (typeof text !== 'string') return false;
          if (text.indexOf(SPLIT_MARK) === -1) return false;

          const parts = text.split(SPLIT_MARK);
          if (parts.length < 2) return false;

          const titleText = (parts[0] || '').trim();
          const dateParts = parts.slice(1);
          const dateText = dateParts.join(SPLIT_MARK).trim();

          if (!titleText && !dateText) return false;

          const row = document.createElement('div');
          row.className = 'entry-row-flex';

          const titleSpan = document.createElement('span');
          titleSpan.className = 'entry-title-left';
          titleSpan.textContent = titleText || '(无标题)';

          const dateSpan = document.createElement('span');
          dateSpan.className = 'entry-date-right';
          dateSpan.textContent = dateText || '';

          row.appendChild(titleSpan);
          row.appendChild(dateSpan);

          const parent = textNode.parentNode;
          if (!parent) return false;

          try {
            parent.replaceChild(row, textNode);
          } catch (e) {
            return false;
          }
          row[PROCESSED_FLAG] = true;
          return true;
        }

        function isInsideSkippedTag(node) {
          let p = node.parentNode;
          while (p) {
            if (p.nodeType === 1) {
              const tag = (p.tagName || '').toUpperCase();
              if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'NOSCRIPT' || tag === 'TEXTAREA') {
                return true;
              }
              if (p.classList && (
                p.classList.contains('entry-row-flex') ||
                p.classList.contains('entry-title-left') ||
                p.classList.contains('entry-date-right')
              )) {
                return true;
              }
              if (p[PROCESSED_FLAG]) {
                return true;
              }
            }
            p = p.parentNode;
          }
          return false;
        }

        function scanAndSplit(root) {
          if (!root) root = document.body;
          let found = 0;
          const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode: function (node) {
              if (!node.nodeValue || node.nodeValue.indexOf(SPLIT_MARK) === -1) {
                return NodeFilter.FILTER_REJECT;
              }
              if (isInsideSkippedTag(node)) {
                return NodeFilter.FILTER_REJECT;
              }
              return NodeFilter.FILTER_ACCEPT;
            }
          });

          const targets = [];
          let n;
          while ((n = walker.nextNode())) targets.push(n);

          for (let i = 0; i < targets.length; i++) {
            if (splitTextNode(targets[i])) found++;
          }
          return found;
        }

        function debouncedScan(delay) {
          if (debounceTimer) clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function () {
            scanAndSplit(document.body);
          }, delay || 80);
        }

        function boot() {
          scanAndSplit(document.body);

          const observer = new MutationObserver(function (mutations) {
            let shouldScan = false;
            for (let i = 0; i < mutations.length; i++) {
              const m = mutations[i];
              if (m.type === 'characterData') {
                if (m.target && m.target.nodeValue && m.target.nodeValue.indexOf(SPLIT_MARK) !== -1) {
                  if (!isInsideSkippedTag(m.target)) {
                    shouldScan = true;
                    break;
                  }
                }
              }
              if (m.addedNodes && m.addedNodes.length) {
                shouldScan = true;
                break;
              }
            }
            if (shouldScan) {
              debouncedScan(80);
            }
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            characterData: true,
          });

          let rounds = 0;
          const timer = setInterval(function () {
            rounds++;
            const found = scanAndSplit(document.body);
            if (rounds >= 25 || (rounds > 5 && found === 0 && !debounceTimer)) {
              clearInterval(timer);
            }
          }, 400);

          if (window.CMS && typeof window.CMS.registerEventListener === 'function') {
            try {
              window.CMS.registerEventListener({
                name: 'entryListSplit',
                handler: function () {
                  debouncedScan(100);
                }
              });
            } catch (e) {}
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot);
        } else {
          boot();
        }
      })();

      // ========== 新建文章时自动填充当前日期时间 ==========
      (function () {
        const DATE_FIELD_FLAG = '__auto_date_filled__';
        const PLACEHOLDER_PATTERN = /\?{4}-\?{2}-\?{2}|--:--|^\s*$/;

        function padZero(n) {
          return (n < 10 ? '0' : '') + n;
        }

        function getCurrentDateTimeLocal() {
          const now = new Date();
          const year = now.getFullYear();
          const month = padZero(now.getMonth() + 1);
          const day = padZero(now.getDate());
          const hours = padZero(now.getHours());
          const minutes = padZero(now.getMinutes());
          const seconds = padZero(now.getSeconds());
          return {
            dateStr: year + '-' + month + '-' + day,
            timeStr: hours + ':' + minutes,
            fullStr: year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds
          };
        }

        function findDateInputs() {
          const inputs = [];
          const allInputs = document.querySelectorAll('input[type="date"], input[type="datetime-local"], input[type="text"]');
          allInputs.forEach(function (input) {
            const val = input.value || '';
            const labelText = (function () {
              const id = input.id || input.name || '';
              if (!id) return '';
              const label = document.querySelector('label[for="' + id + '"]');
              return label ? (label.textContent || '').toLowerCase() : '';
            })();
            const isDateField = 
              input.type === 'date' || 
              input.type === 'datetime-local' ||
              (PLACEHOLDER_PATTERN.test(val) && (labelText.indexOf('日期') !== -1 || labelText.indexOf('date') !== -1));
            if (isDateField) {
              inputs.push(input);
            }
          });

          const allSelects = document.querySelectorAll('select');
          allSelects.forEach(function (select) {
            if (select && select.parentNode) {
              const wrapper = select.closest('[class*="DateTimeWidget"], [class*="datetime-widget"], [class*="DateControl"], [class*="date-control"]');
              if (wrapper && !wrapper[DATE_FIELD_FLAG]) {
                inputs.push(wrapper);
              }
            }
          });

          return inputs;
        }

        function fillDateTimeWidget(wrapper, values) {
          if (!wrapper || wrapper[DATE_FIELD_FLAG]) return false;

          const dateInput = wrapper.querySelector('input[type="date"], input[type="text"]');
          const timeInput = wrapper.querySelectorAll('input[type="time"], input[type="text"]')[1] || 
                           wrapper.querySelector('input[type="time"]');
          const selects = wrapper.querySelectorAll('select');
          
          let filled = false;

          if (dateInput && PLACEHOLDER_PATTERN.test(dateInput.value || '')) {
            try {
              dateInput.value = values.dateStr;
              dateInput.dispatchEvent(new Event('input', { bubbles: true }));
              dateInput.dispatchEvent(new Event('change', { bubbles: true }));
              filled = true;
            } catch (e) {}
          }

          if (timeInput && PLACEHOLDER_PATTERN.test(timeInput.value || '')) {
            try {
              timeInput.value = values.timeStr;
              timeInput.dispatchEvent(new Event('input', { bubbles: true }));
              timeInput.dispatchEvent(new Event('change', { bubbles: true }));
              filled = true;
            } catch (e) {}
          }

          if (selects.length >= 3) {
            const yearSel = selects[0];
            const monthSel = selects[1];
            const daySel = selects[2];
            
            const y = values.dateStr.substring(0, 4);
            const m = values.dateStr.substring(5, 7);
            const d = values.dateStr.substring(8, 10);

            tryFillSelect(yearSel, y);
            tryFillSelect(monthSel, m);
            tryFillSelect(daySel, d);

            if (selects.length >= 5) {
              const hourSel = selects[3];
              const minSel = selects[4];
              const h = values.timeStr.substring(0, 2);
              const min = values.timeStr.substring(3, 5);
              tryFillSelect(hourSel, h);
              tryFillSelect(minSel, min);
            }
            filled = true;
          }

          if (filled) {
            wrapper[DATE_FIELD_FLAG] = true;
          }
          return filled;
        }

        function tryFillSelect(select, value) {
          if (!select) return false;
          for (let i = 0; i < select.options.length; i++) {
            const opt = select.options[i];
            const optVal = (opt.value || opt.textContent || '').trim();
            if (optVal === value || parseInt(optVal, 10) === parseInt(value, 10)) {
              if (select.value !== value) {
                select.value = opt.value;
                select.dispatchEvent(new Event('change', { bubbles: true }));
                select.dispatchEvent(new Event('input', { bubbles: true }));
              }
              return true;
            }
          }
          return false;
        }

        function tryClickNowButton(wrapper) {
          if (!wrapper) return false;
          const buttons = wrapper.querySelectorAll('button, [role="button"], [class*="Now"], [class*="now"]');
          for (let i = 0; i < buttons.length; i++) {
            const btn = buttons[i];
            const txt = (btn.textContent || '').toLowerCase().trim();
            if (txt === 'now' || txt === '现在' || txt.indexOf('now') !== -1 || txt.indexOf('现在') !== -1) {
              try {
                btn.click();
                return true;
              } catch (e) {}
            }
          }
          return false;
        }

        function scanAndFillDate() {
          const values = getCurrentDateTimeLocal();
          const dateTargets = findDateInputs();
          let anyFilled = false;

          for (let i = 0; i < dateTargets.length; i++) {
            const target = dateTargets[i];
            if (target.nodeType === 1 && target.tagName !== 'INPUT') {
              if (tryClickNowButton(target)) {
                anyFilled = true;
                target[DATE_FIELD_FLAG] = true;
                continue;
              }
              if (fillDateTimeWidget(target, values)) {
                anyFilled = true;
              }
            } else if (target.tagName === 'INPUT') {
              const val = target.value || '';
              if (PLACEHOLDER_PATTERN.test(val)) {
                try {
                  if (target.type === 'date') {
                    target.value = values.dateStr;
                  } else if (target.type === 'datetime-local') {
                    target.value = values.dateStr + 'T' + values.timeStr;
                  } else {
                    target.value = values.fullStr;
                  }
                  target.dispatchEvent(new Event('input', { bubbles: true }));
                  target.dispatchEvent(new Event('change', { bubbles: true }));
                  anyFilled = true;
                } catch (e) {}
              }
            }
          }

          return anyFilled;
        }

        let fillTimer = null;
        function debouncedFill(delay) {
          if (fillTimer) clearTimeout(fillTimer);
          fillTimer = setTimeout(scanAndFillDate, delay || 150);
        }

        function bootAutoDate() {
          setTimeout(scanAndFillDate, 500);

          const observer = new MutationObserver(function (mutations) {
            let shouldCheck = false;
            for (let i = 0; i < mutations.length; i++) {
              const m = mutations[i];
              if (m.addedNodes && m.addedNodes.length > 0) {
                shouldCheck = true;
                break;
              }
              if (m.type === 'attributes' && m.target && m.target.tagName === 'INPUT') {
                shouldCheck = true;
                break;
              }
            }
            if (shouldCheck) {
              debouncedFill(120);
            }
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['value', 'class']
          });

          let rounds = 0;
          const intervalTimer = setInterval(function () {
            rounds++;
            scanAndFillDate();
            if (rounds >= 15) {
              clearInterval(intervalTimer);
            }
          }, 800);

          if (window.CMS && typeof window.CMS.registerEventListener === 'function') {
            try {
              window.CMS.registerEventListener({
                name: 'prePublishAutoDate',
                handler: function (event) {
                  setTimeout(function () {
                    scanAndFillDate();
                  }, 200);
                }
              });
            } catch (e) {}
          }

          if (window.CMS && typeof window.CMS.registerEventListener === 'function') {
            try {
              window.CMS.registerEventListener({
                name: 'onEntryNew',
                handler: function (event) {
                  setTimeout(function () {
                    scanAndFillDate();
                  }, 300);
                }
              });
            } catch (e) {}
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', bootAutoDate);
        } else {
          bootAutoDate();
        }
      })();
    </script>
  </body>
</html>
