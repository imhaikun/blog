<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 0;
    }
    #loginModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    .loginContainer {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin: 0 0 30px 0;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0052a3;
    }
    .help {
      margin-top: 20px;
      padding: 12px;
      background: #f9f9f9;
      border-left: 3px solid #0066cc;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="loginModal">
    <div class="loginContainer">
      <h1>GitHub Token Login</h1>
      <form id="tokenForm">
        <div class="form-group">
          <label for="token">GitHub Personal Access Token:</label>
          <input 
            type="password" 
            id="token" 
            name="token" 
            placeholder="ghp_xxxxx..." 
            required
            autocomplete="off"
          />
        </div>
        <button type="submit">Login</button>
      </form>
      <div class="help">
        <p><strong>How to get a token:</strong></p>
        <ol style="margin: 8px 0; padding-left: 20px;">
          <li>Go to <a href="https://github.com/settings/tokens" target="_blank">GitHub Settings → Tokens</a></li>
          <li>Click "Generate new token (classic)"</li>
          <li>Select <strong>repo</strong> scope</li>
          <li>Copy and paste the token here</li>
        </ol>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const token = localStorage.getItem('github_token');
      
      if (!token) {
        document.getElementById('loginModal').style.display = 'flex';
        document.getElementById('tokenForm').addEventListener('submit', function(e) {
          e.preventDefault();
          const inputToken = document.getElementById('token').value;
          if (inputToken) {
            localStorage.setItem('github_token', inputToken);
            document.getElementById('loginModal').style.display = 'none';
            // Load Decap CMS after token is saved
            loadDecapCMS();
          }
        });
      } else {
        document.getElementById('loginModal').style.display = 'none';
        loadDecapCMS();
      }
      
      function loadDecapCMS() {
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3/dist/decap-cms.js';
        script.onerror = function() {
          console.error('Failed to load Decap CMS');
        };
        document.body.appendChild(script);
      }
    })();
  </script>
</body>
</html>
