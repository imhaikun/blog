local_backend: true

backend:
  name: github
  repo: imhaikun/blog
  branch: main
  base_url: https://one.202616.xyz
  auth_endpoint: api/auth

media_folder: "source/images"
public_folder: "/images"
media_library:
  name: "r2"
  config:
    upload_url: "/api/r2-upload"
    base_url: "https://images.202616.xyz"

collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"
    folder: "source/_posts"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}}__TITLE_DATE_SPLIT__{{date | date('YYYY-MM-DD HH:mm')}}"
    sortable_fields: ['date', 'title']
    view_filters:
      - label: "按年份"
        field: date
        pattern: ""
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "作者", name: "author", widget: "string", required: false}
      - {label: "日期", name: "date", widget: "datetime", default: "{{now}}", format: "YYYY-MM-DD HH:mm:ss", date_format: "YYYY-MM-DD", time_format: "HH:mm"}
      - {label: "分类", name: "categories", widget: "string", required: false}
      - {label: "标签", name: "tags", widget: "list", field: {label: "标签", name: "tag", widget: "string"}, required: false}
      - {label: "正文", name: "body", widget: "markdown"}

  - name: "pages"
    label: "独立页面"
    label_singular: "独立页面"
    folder: "source"
    create: true
    media_folder: ""
    public_folder: ""
    slug: "{{title}}"
    identifier_field: title
    summary: "{{title}} ({{layout}})"
    sortable_fields: ['title']
    nested:
      depth: 2
    filter:
      field: layout
      pattern: ".+"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "布局类型", name: "layout", widget: "select", options: [
          {label: "普通页面 (page)", value: "page"},
          {label: "分类页 (category)", value: "category"},
          {label: "标签页 (tag)", value: "tag"},
          {label: "归档页 (archive)", value: "archive"}
        ]}
      - {label: "作者", name: "author", widget: "string", required: false}
      - {label: "排序索引", name: "menu_order", widget: "number", value_type: "int", required: false, default: 0}
      - {label: "正文内容", name: "body", widget: "markdown", required: false}

  - name: "settings"
    label: "设置"
    files:
      - name: "site"
        label: "站点基本设置"
        file: "_config.yml"
        fields:
          - {label: "站点标题", name: "title", widget: "string", required: false}
          - {label: "副标题 / Slogan", name: "subtitle", widget: "string", required: false}
          - {label: "站点描述", name: "description", widget: "text", required: false}
          - {label: "关键词", name: "keywords", widget: "string", required: false}
          - {label: "作者", name: "author", widget: "string", required: false}
          - {label: "站点语言", name: "language", widget: "string", default: "zh-CN", required: false}
          - {label: "时区", name: "timezone", widget: "string", default: "Asia/Shanghai", required: false}
          - {label: "站点 URL", name: "url", widget: "string", required: false}
          - {label: "启用主题", name: "theme", widget: "select", required: false, options: ["greenleaf", "landscape"]}
          - {label: "文章归档目录", name: "archive_dir", widget: "string", default: "archives", required: false}
          - {label: "分类目录", name: "category_dir", widget: "string", default: "categories", required: false}
          - {label: "标签目录", name: "tag_dir", widget: "string", default: "tags", required: false}
          - {label: "每页文章数", name: "per_page", widget: "number", value_type: "int", default: 10, required: false}

      - name: "theme_greenleaf"
        label: "Greenleaf 主题配置"
        file: "_config.greenleaf.yml"
        fields:
          - {label: "主题品牌 Logo 文字", name: "site_brand", widget: "string", required: false}
          - {label: "作者简介（侧栏显示）", name: "author_bio", widget: "text", required: false}
          - {label: "导航菜单", name: "menu", widget: "list", required: false,
              field: {label: "菜单项", name: "item", widget: "object", fields: [
                {label: "菜单名称", name: "name", widget: "string"},
                {label: "链接路径", name: "path", widget: "string"},
                {label: "图标 class", name: "icon", widget: "string", required: false}
              ]}}
          - {label: "首页文章列表每页数量", name: "index_per_page", widget: "number", value_type: "int", default: 10, required: false}
          - {label: "是否显示文章阅读时长", name: "show_reading_time", widget: "boolean", default: true, required: false}
          - {label: "是否显示文章字数统计", name: "show_word_count", widget: "boolean", default: true, required: false}
          - {label: "评论系统类型", name: "comment_system", widget: "select", required: false, options: [
              {label: "关闭", value: "none"},
              {label: "Disqus", value: "disqus"},
              {label: "Giscus", value: "giscus"},
              {label: "Waline", value: "waline"}
            ]}
          - {label: "评论系统 shortname / repo 等参数", name: "comment_config", widget: "string", required: false}
          - {label: "页脚版权文字", name: "footer_text", widget: "text", required: false}
          - {label: "页脚备案号", name: "footer_icp", widget: "string", required: false}
          - {label: "第三方统计代码 (HTML)", name: "analytics_html", widget: "text", required: false}

      - name: "theme_list_data"
        label: "主题列表数据（展示于控制台→外观）"
        file: "source/_data/theme_list.yml"
        fields:
          - {label: "可用主题列表", name: "themes", widget: "list", required: true,
              field: {label: "主题", name: "theme", widget: "object", fields: [
                {label: "主题标识 (与目录名一致)", name: "key", widget: "string"},
                {label: "主题名称", name: "name", widget: "string"},
                {label: "作者", name: "author", widget: "string", required: false},
                {label: "版本号", name: "version", widget: "string", required: false},
                {label: "主题简介", name: "description", widget: "text", required: false},
                {label: "预览截图 URL（可选）", name: "screenshot", widget: "image", required: false, media_folder: "/images"}
              ]}}

